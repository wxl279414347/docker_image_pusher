name: Sync ARM Images To Aliyun
on:
  workflow_dispatch:

# 最高权限（解决所有权限报错）
permissions:
  contents: read
  packages: write
  id-token: write

# 你的环境变量
env:
  ALIYUN_REGISTRY: registry.cn-hangzhou.aliyuncs.com
  ALIYUN_NAME_SPACE: wxl_githubdocker
  ALIYUN_REGISTRY_USER: ${{ secrets.ALIYUN_REGISTRY_USER }}
  ALIYUN_REGISTRY_PASSWORD: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # ==========================
      # 你要的：Docker 登录命令
      # ==========================
      - name: Docker Login Aliyun
        run: |
          docker login -u $ALIYUN_REGISTRY_USER -p $ALIYUN_REGISTRY_PASSWORD $ALIYUN_REGISTRY

      # ==========================
      # 同步镜像 + 去重 + 权限
      # ==========================
      - name: Pull and Push Images
        run: |
          declare -A duplicate_images
          declare -A temp_map

          while IFS= read -r image || [[ -n "$image" ]]; do
            if [[ -z "$image" || "$image" =~ ^# ]]; then
              continue
            fi

            # 去重
            if [[ -n "${duplicate_images[$image]}" ]]; then
              echo "⚠️ 跳过重复镜像: $image"
              continue
            fi
            duplicate_images["$image"]=1

            echo "====================================="
            echo " 🚀 处理镜像: $image"
            echo "====================================="

            # 把你的名称 转回官方镜像名
            original=$(echo "$image" | sed -E 's/arm64v8-([^:]+)/arm64v8\/\1/')

            # 拉取 ARM 架构
            docker pull --platform linux/arm64 "$original"

            # 打标签并推送到阿里云
            target="${ALIYUN_REGISTRY}/${ALIYUN_NAME_SPACE}/$image"
            docker tag "$original" "$target"
            docker push "$target"

          done < images.txt
