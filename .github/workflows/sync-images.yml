name: Sync ARM Images To Aliyun
on:
  workflow_dispatch:

# 权限配置（解决权限报错）
permissions:
  contents: read
  packages: write

# 你要的环境变量（完全按你的写法）
env:
  ALIYUN_REGISTRY: "registry.cn-hangzhou.aliyuncs.com"
  ALIYUN_NAME_SPACE: "wxl_githubdocker"
  ALIYUN_REGISTRY_USER: ${{ secrets.ALIYUN_REGISTRY_USER }}
  ALIYUN_REGISTRY_PASSWORD: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # 你要的：命令行 docker login（不是插件，纯命令）
      - name: Docker Login 阿里云
        run: |
          docker login -u $ALIYUN_REGISTRY_USER -p $ALIYUN_REGISTRY_PASSWORD $ALIYUN_REGISTRY

      # 同步镜像 + 去重判断 + 架构指定
      - name: Pull and Push Images
        run: |
          # 你要的：声明关联数组，用于去重
          declare -A duplicate_images
          declare -A temp_map

          while IFS= read -r image; do
            # 跳过空行、注释
            if [[ -z "$image" || "$image" =~ ^# ]]; then
              continue
            fi

            # 去重判断：如果镜像已经处理过，跳过
            if [[ -n "${duplicate_images[$image]}" ]]; then
              echo "⚠️  镜像已处理，跳过：$image"
              continue
            fi
            duplicate_images["$image"]=1

            echo "====================================="
            echo "🚀 处理镜像：$image"
            echo "====================================="

            # 拉取 ARM64 架构（解决你之前的架构报错）
            docker pull --platform linux/arm64 "$image"

            # 拼接阿里云地址
            target="${ALIYUN_REGISTRY}/${ALIYUN_NAME_SPACE}/$image"

            # 打标签
            docker tag "$image" "$target"

            # 推送
            docker push "$target"

          done < images.txt
