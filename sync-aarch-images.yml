- name: Pull and Push ARM64 Images
  run: |
    while IFS= read -r image; do

      if [ -z "$image" ] || [[ "$image" =~ ^# ]]; then
        continue
      fi
      
      echo "============================="
      echo "正在同步: $image"
      echo "============================="
      

      docker pull --platform linux/arm64 "$image"
      

      target="registry.cn-hangzhou.aliyuncs.com/wxl_githubdocker/$image"
      docker tag "$image" "$target"
      docker push "$target"
    done < images.txt
