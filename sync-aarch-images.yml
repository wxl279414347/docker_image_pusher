name: Sync Multi-Arch Docker Images
on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: 279414347@qq.com
          password: w900224j

      - name: Pull and Push ARM64 Images
        run: |
          while IFS= read -r image; do
            if [ -z "$image" ]; then continue; fi
            echo "============================="
            echo "正在同步: $image"
            echo "============================="
            
            # 拉取 ARM64 镜像
            docker pull --platform linux/arm64 "$image"
            
            # 推送到阿里云
            target="registry.cn-hangzhou.aliyuncs.com/wxl_githubdocker/$image"
            docker tag "$image" "$target"
            docker push "$target"
          done < images.txt
